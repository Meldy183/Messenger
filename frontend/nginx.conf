server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/v1/auth/* → auth-service:8080
    location /api/v1/auth/ {
        proxy_pass http://auth-service:8080/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /api/v1/* → chat-service:8081
    location /api/v1/ {
        proxy_pass http://chat-service:8081/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket → chat-service:8081
    location /ws {
        proxy_pass http://chat-service:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
